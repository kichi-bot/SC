# Deploy the SC study dashboards to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site

          # Keep the existing SC afternoon dashboard at the site root.
          cp -a html/. _site/

          # Publish the SC AM2 dashboard at /am2/ with its assets and notes.
          mkdir -p _site/am2
          cp -a docs/. _site/am2/

          # The AM2 dashboard links to data via ../data/.
          if [ -d data ]; then
            cp -a data _site/data
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
