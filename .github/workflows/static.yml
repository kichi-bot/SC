# Deploy the SC study dashboards to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site

          # Keep the existing SC afternoon dashboards at the site root.
          cp -a html/. _site/

          # Apply the shared dark theme to every HTML page copied from html/.
          python3 - <<'PY'
          from pathlib import Path
          import os

          site = Path("_site")
          theme = site / "dark.css"
          for page in site.rglob("*.html"):
              text = page.read_text(encoding="utf-8")
              if "data-sc-dark-theme" in text or "</head>" not in text:
                  continue
              href = Path(os.path.relpath(theme, page.parent)).as_posix()
              link = f'  <link rel="stylesheet" href="{href}" data-sc-dark-theme>\n'
              page.write_text(text.replace("</head>", link + "</head>", 1), encoding="utf-8")
          PY

          # Publish the SC AM2 dashboard at /am2/ with its assets and notes.
          mkdir -p _site/am2
          cp -a docs/. _site/am2/

          # The AM2 dashboard links to data via ../data/.
          if [ -d data ]; then
            cp -a data _site/data
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
